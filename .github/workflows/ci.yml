name: CI

# Verifica, a cada push ou Pull Request, se o projeto continua compilando.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Compilar o projeto
        run: npm run build
        env:
          # Valores fictícios só para a compilação (a build não acessa a agenda).
          AUTH_SECRET: ci-placeholder-secret
